<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0f766e">
<title>لياقتي | Liyaqti</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
:root{--bg:#f4f7f6;--card:#fff;--txt:#111827;--muted:#667085;--pri:#0f766e;--line:#e5e7eb}
body.dark{--bg:#071412;--card:#10201d;--txt:#f8fafc;--muted:#a7b5b1;--line:#1f3833}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
.app{max-width:1050px;margin:auto;padding:16px 16px 95px}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px}
.logo{display:flex;gap:10px;align-items:center}
.ico{
    width:64px;
    height:64px;
    border-radius:18px;
    background:linear-gradient(135deg,#17b3a3,#0f766e);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    color:#fff;
    box-shadow:0 10px 25px rgba(15,118,110,.25);
}

.logoL{
    font-size:38px;
    font-weight:800;
    color:#fff;
    line-height:1;
}

.logoLeaf{
    position:absolute;
    top:8px;
    right:12px;
    font-size:11px;
    color:#b8ffcb;
    transform:rotate(45deg);
}
.btn{border:0;border-radius:14px;padding:13px 18px;font-weight:800;background:var(--pri);color:white;font-size:15px}
.btn2{background:var(--card);color:var(--txt);border:1px solid var(--line)}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(4,1fr);margin-top:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 10px 24px #0001}
.muted{color:var(--muted);font-size:13px}
.num{font-size:28px;font-weight:900}
.hero{grid-template-columns:1fr 1fr;margin-top:14px}
.form{grid-template-columns:1fr 1fr;gap:16px}
.entryForm{margin-top:18px}
.entryForm .field{background:#f8faf9;border:1px solid var(--line);border-radius:18px;padding:10px 12px;min-height:92px}
body.dark .entryForm .field{background:#0b1b18}
.entryForm label{margin:0 0 8px;font-size:14px;font-weight:800}
.entryForm input{border:0;background:transparent;height:36px;padding:0;font-size:20px;font-weight:800}
.field{min-width:0}
input{width:100%;height:64px;padding:20px 18px 10px;border-radius:20px;border:1px solid #d9e2e8;background:#fafbfc;color:var(--txt);font-size:20px;font-weight:700;outline:none}
input:focus{border-color:#0f766e;background:#fff;box-shadow:0 0 0 4px rgba(15,118,110,.15)}
label{display:block;margin-bottom:8px;font-size:15px;font-weight:800;color:#667085}
.saveBtn{width:100%;margin-top:14px;height:58px;border:0;border-radius:18px;background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;font-size:24px;font-weight:900}
.bar{height:18px;background:#dff3ef;border-radius:99px;overflow:hidden;margin-top:22px}
.fill{height:100%;width:0;background:linear-gradient(90deg,#0f766e,#14b8a6);border-radius:99px;transition:width .7s ease}
.tabs{position:fixed!important;bottom:16px!important;left:50%!important;transform:translateX(-50%)!important;width:min(520px,calc(100% - 24px));background:var(--card);border:1px solid var(--line);border-radius:22px;padding:7px;display:grid;grid-template-columns:repeat(6,1fr);gap:5px;z-index:9999;box-shadow:0 8px 25px #0002}
.tab{border:0;background:transparent;color:var(--muted);padding:10px 4px;border-radius:16px;font-weight:800;font-size:12px;white-space:nowrap}
.tab.on{background:var(--pri);color:#fff}
.page{display:none}
.page.on{display:block}
table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid var(--line);text-align:start}
.coachBox{background:linear-gradient(135deg,#eefaf7,#fff);border:1px solid rgba(0,0,0,.06);border-radius:18px;padding:14px;margin-top:12px;line-height:1.7;box-shadow:0 8px 22px rgba(0,0,0,.06)}
body.dark .coachBox{background:linear-gradient(135deg,#0b1b18,#10201d)}
.coachTitle{font-size:15px;font-weight:800;margin-bottom:6px}
.coachText{color:var(--muted);font-size:13px;line-height:1.6;font-weight:500}
.coachList{display:grid;gap:10px;margin-top:14px}
.coachItem{background:#ffffffcc;border:1px solid #d8eee9;border-radius:16px;padding:10px;font-size:14px;font-weight:700}
body.dark .coachItem{background:#10201d}
.statsGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.statCard{background:var(--card);border-radius:18px;padding:15px;border:1px solid var(--line);box-shadow:0 8px 20px rgba(0,0,0,.05);text-align:center}
.statValue{font-size:22px;font-weight:900;color:var(--pri);margin-top:6px}
.statLabel{font-size:12px;color:var(--muted);font-weight:600}
.chartHeader{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.filterBtns{display:flex;gap:6px}
.miniBtn{border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:12px;padding:8px 12px;font-weight:800}
.miniBtn.on{background:var(--pri);color:#fff}
.calHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.calHead h3{margin:0;flex:1;text-align:center}
.weekDays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px;text-align:center;font-weight:800;color:var(--muted);font-size:13px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:10px}
.day{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center;font-size:13px;font-weight:800;background:var(--card);border:1px solid var(--line);cursor:pointer}
.dayNum{font-size:14px;font-weight:900;line-height:1}
.dayWeight{font-size:9px;font-weight:900;opacity:.85;line-height:1;direction:ltr}
.day.empty{opacity:0;border:0;pointer-events:none}
.day.loss{background:#dff7e8;color:#118a43}
.day.gain{background:#ffe4e4;color:#c62828}
.day.today{border:2px solid var(--pri)}
.day.selected{border:3px solid var(--pri);box-shadow:0 8px 18px rgba(15,118,110,.25);transform:scale(1.06)}
.dayInfo{margin-top:16px;padding:16px;border-radius:18px;background:linear-gradient(135deg,#eefaf7,#fff);border:1px solid #d8eee9;color:var(--txt);font-weight:800;line-height:1.7;box-shadow:0 8px 22px rgba(0,0,0,.06)}
.dayInfo.emptyInfo{background:var(--bg);color:var(--muted);text-align:center}
.dayInfoTitle{font-size:15px;color:var(--muted);margin-bottom:10px}
.dayInfoGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.dayInfoItem{background:#ffffffcc;border:1px solid #d8eee9;border-radius:14px;padding:10px;font-size:13px}
.dayInfoValue{font-size:18px;font-weight:900;color:var(--pri);margin-top:4px;direction:ltr;text-align:right}
.legend{display:flex;justify-content:center;gap:14px;margin-top:16px;flex-wrap:wrap;font-size:13px;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:6px}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block}
.dot.loss{background:#dff7e8;border:1px solid #118a43}
.dot.gain{background:#ffe4e4;border:1px solid #c62828}
.dot.normal{background:#fff;border:1px solid #d9d9d9}
@media(max-width:800px){
.app{padding:14px 12px 95px}
.kpis{grid-template-columns:repeat(2,1fr)}
.hero{grid-template-columns:1fr}
.form{grid-template-columns:1fr}
.card{border-radius:24px;padding:18px}
.num{font-size:28px;font-weight:950;letter-spacing:-1px}
}
@media(max-width:390px){
.kpis{grid-template-columns:1fr}
.tab{font-size:13px;padding:10px 5px}
}
.activityLive{
background:linear-gradient(135deg,#0f766e,#14b8a6);
color:#fff;
border-radius:22px;
padding:18px;
margin-top:14px;
box-shadow:0 10px 24px #0002;
}

.activityTimer{
font-size:42px;
font-weight:900;
text-align:center;
direction:ltr;
margin:12px 0;
}

.activityBtns{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:15px;
}

.activityHistory{
display:grid;
gap:12px;
margin-top:16px;
}

.activityItem{
background:var(--card);
border:1px solid var(--line);
border-radius:16px;
padding:14px;
}
.routeMap{
height:320px;
width:100%;
border-radius:20px;
border:1px solid var(--line);
margin-top:14px;
overflow:hidden;
}
</style>
</head>

<body>
<div class="app">
<div class="top">
<div class="logo"><div class="ico">
    <span class="logoL">L</span>
    <span class="logoLeaf">◢</span>
</div><div><h2 id="title">لياقتي | Liyaqti</h2><div class="muted" id="sub">رفيقك الذكي للصحة واللياقة</div></div></div>
<div><button class="btn btn2" onclick="lang()">EN</button> <button class="btn btn2" onclick="dark()">🌙</button></div>
</div>

<div id="home" class="page on"></div>

<div id="goalPage" class="page"></div>

<div id="dash" class="page">
</div>

<div id="stepsPage" class="page"></div>

<div id="reports" class="page">
<h3 data-k="reports">التقارير</h3>
<div class="card">
<button class="btn btn2" onclick="csv()">تصدير CSV</button>
<table>
<thead><tr><th>التاريخ</th><th>الوزن</th><th>التغير</th><th>الخطوات</th><th>السعرات</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<div id="settings" class="page"></div>


<div class="tabs">
<button class="tab on" onclick="pg('home',this)">الرئيسية</button>
<button class="tab" onclick="pg('goalPage',this)">هدفي</button>
<button class="tab" onclick="pg('dash',this)">التغذية</button>
<button class="tab" onclick="pg('stepsPage',this)">خطواتي</button>
<button class="tab" onclick="pg('reports',this)">التحليل</button>
<button class="tab" onclick="pg('settings',this)">الإعدادات</button>
</div>

<script src="storage.js"></script>
<script>
let D = loadWeights();

let S = loadSettings();
if(!S.goalType) S.goalType = "loss";

let SD = loadSteps();

let C,W,P;
let range = "all";
let selectedDay = "";
let calDate = new Date();

function isoDate(d=new Date()){
return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function normDate(v){
if(!v)return "";
if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;
let p=Date.parse(v);
if(!isNaN(p))return isoDate(new Date(p));
return v;
}

if(date) date.value=isoDate();

D=D.map(x=>({...x,d:normDate(x.d)})).sort((a,b)=>a.d.localeCompare(b.d));
SD=SD.map(x=>({...x,d:normDate(x.d),steps:+x.steps||0})).sort((a,b)=>a.d.localeCompare(b.d));
saveWeights(D);
saveStepsData(SD);

const T={
ar:{start:"وزن البداية",current:"الحالي",goal:"الهدف",remain:"المتبقي",add:"تسجيل اليوم",date:"التاريخ",weight:"الوزن",steps:"الخطوات",cal:"السعرات",save:"حفظ",coach:"التحليل الذكي",dash:"الداشبورد",reports:"التقارير",settings:"الإعدادات"},
en:{start:"Start",current:"Current",goal:"Goal",remain:"Remaining",add:"Today Entry",date:"Date",weight:"Weight",steps:"Steps",cal:"Calories",save:"Save",coach:"Smart Coach",dash:"Dashboard",reports:"Reports",settings:"Settings"}
};

function tr(){
document.documentElement.lang=S.lang;
document.documentElement.dir=S.lang=="ar"?"rtl":"ltr";
document.querySelectorAll("[data-k]").forEach(e=>e.textContent=T[S.lang][e.dataset.k]);
title.textContent=S.lang=="ar"?"لياقتي | Liyaqti":"Liyaqti";
sub.textContent=S.lang=="ar"?"رفيقك الذكي لصحة ولياقة أفضل":"Smart weight tracker";
}

function lang(){S.lang=S.lang=="ar"?"en":"ar";saveSettings(S);tr()}
function dark(){document.body.classList.toggle("dark")}

function pg(id,b){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("on"));
document.getElementById(id).classList.add("on");
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
b.classList.add("on");
draw();
if(typeof renderSteps === "function") renderSteps();
}

function save(){
if(!weight.value)return alert("اكتب الوزن");
let x={d:date.value,w:+weight.value,st:+steps.value||0,cal:+cal.value||0};
D=D.filter(a=>a.d!==x.d);
D.push(x);
D.sort((a,b)=>a.d.localeCompare(b.d));

if(x.st>0){
SD=SD.filter(a=>a.d!==x.d);
SD.push({d:x.d,steps:x.st});
SD.sort((a,b)=>a.d.localeCompare(b.d));
localStorage.wazniSteps=JSON.stringify(SD);
}

localStorage.wazni=JSON.stringify(D);
selectedDay=x.d;
weight.value=steps.value=cal.value="";
render();
pickDay(x.d);
}

function set(){
S={start:+start.value,goal:+goal.value,height:+height.value,name:name.value,lang:S.lang};
localStorage.wazniS=JSON.stringify(S);
render();
}

function clearAll(){
if(confirm("مسح كل البيانات؟")){
D=[];
SD=[];
localStorage.wazni="[]";
localStorage.wazniSteps="[]";
selectedDay="";
render();
}
}

function setRange(r,b){
range=r;
document.querySelectorAll(".filterBtns .miniBtn").forEach(x=>x.classList.remove("on"));
if(b)b.classList.add("on");
draw();
}

function dataRange(){
if(range==="7")return D.slice(-7);
if(range==="30")return D.slice(-30);
return D;
}

function toggleGoalSelector(){

let x=document.getElementById("goalSelector");

x.style.display=
x.style.display=="block"
?"none":"block";

}

function setGoalType(type){

let names={
loss:"خسارة الوزن",
gain:"زيادة وزن",
run:"اختبار رياضي",
steps:"تحدي خطوات",
gym:"بناء عضلات",
custom:"هدف مخصص"
};

S.goalType=type;
localStorage.wazniS=JSON.stringify(S);

if(document.getElementById("goalType"))goalType.textContent=names[type];
if(document.getElementById("homeGoalName"))homeGoalName.textContent=names[type];

goalSelector.style.display="none";
render();

}
function renderGoalType(){

let names={
loss:"خسارة الوزن",
gain:"زيادة وزن",
run:"اختبار رياضي",
steps:"تحدي خطوات",
gym:"بناء عضلات",
custom:"هدف مخصص"
};

let name=names[S.goalType]||" خسارة الوزن";

if(document.getElementById("goalType"))goalType.textContent=name;
if(document.getElementById("homeGoalName"))homeGoalName.textContent=name;

let cur=D.length?D[D.length-1].w:S.start;
let loss=S.start-cur;
let total=S.start-S.goal;
let rem=cur-S.goal;
let weightPct=total?Math.max(0,Math.min(100,loss/total*100)):0;

let percent=weightPct;
let status="نشط";

if(S.goalType==="run"){
  let t=S.sportTest||{distance:3,targetTime:15,currentTime:0};

  if(t.currentTime>0){
    percent=Math.max(0,Math.min(100,(t.targetTime/t.currentTime)*100));
    status=percent>=100?"جاهز":percent>=85?"قريب":"يحتاج تطوير";
  }else{
    percent=0;
    status="أدخل بياناتك";
  }
}

if(S.goalType==="steps"){
  let today=currentSteps().steps||0;
  percent=Math.max(0,Math.min(100,today/8000*100));
  status=percent>=100?"مكتمل":percent>=80?"قريب":"نشط";
}

if(S.goalType==="gain" || S.goalType==="gym" || S.goalType==="custom"){
  percent=0;
  status="قريباً";
}

if(document.getElementById("goalPercent"))goalPercent.textContent=percent.toFixed(0)+"%";
if(document.getElementById("goalStatus"))goalStatus.textContent=status;

}
function saveSportTest(){
  S.sportTest={
    distance:+runDistance.value||3,
    targetTime:+runTargetTime.value||15,
    testDate:runTestDate.value||"",
    currentTime:+runCurrentTime.value||0
  };

  localStorage.wazniS=JSON.stringify(S);
  render();
}
function updateTodayPreview(){
  let box=document.getElementById("todayPreview");
  if(!box)return;

  let w=+weight.value||0;
  let st=+steps.value||0;
  let calv=+cal.value||0;

  if(!w && !st && !calv){
    box.innerHTML="اكتب الوزن أو الخطوات لعرض ملخص اليوم قبل الحفظ.";
    return;
  }

  let cur=w || (D.length?D[D.length-1].w:S.start);
  let lost=S.start-cur;
  let total=S.start-S.goal;
  let remain=cur-S.goal;
  let pct=total?Math.max(0,Math.min(100,lost/total*100)):0;

  let stepsMsg=st>=8000
    ? "✅ تجاوزت هدف الخطوات اليوم"
    : st>0
      ? `👣 باقي لك ${8000-st} خطوة للوصول للهدف`
      : "👣 لم تدخل خطوات اليوم";

  box.innerHTML=`
    <div class="coachTitle">✨ ملخص اليوم قبل الحفظ</div>
    <div class="coachList">
      <div class="coachItem">⚖️ الوزن: ${cur.toFixed(1)} كجم</div>
      <div class="coachItem">${stepsMsg}</div>
      <div class="coachItem">🔥 السعرات: ${calv>0?calv:"لم يتم إدخالها"}</div>
      <div class="coachItem">📉 إجمالي النزول بعد الحفظ: ${lost.toFixed(1)} كجم</div>
      <div class="coachItem">⏳ المتبقي للهدف: ${remain.toFixed(1)} كجم</div>
      <div class="coachItem">🎯 نسبة الإنجاز بعد الحفظ: ${pct.toFixed(0)}%</div>
    </div>
  `;
}

function renderGoalProgress(){
  let cur=D.length?D[D.length-1].w:S.start;
  let lost=S.start-cur;
  let total=S.start-S.goal;
  let remain=cur-S.goal;
  let pct=total?Math.max(0,Math.min(100,lost/total*100)):0;

  if(document.getElementById("goalProgressFill"))goalProgressFill.style.width=pct+"%";
if(document.getElementById("goalCurrentWeight"))goalCurrentWeight.textContent=cur.toFixed(1);
if(document.getElementById("goalTargetWeight"))goalTargetWeight.textContent=S.goal;
if(document.getElementById("goalLostWeight"))goalLostWeight.textContent=lost.toFixed(1);
if(document.getElementById("goalRemainWeight"))goalRemainWeight.textContent=remain.toFixed(1);
}
function renderGoalContent(){
  let isSport=S.goalType==="run";

  let wCard=document.getElementById("weightEntryCard");
  let sCard=document.getElementById("sportTestCard");

  if(wCard)wCard.style.display=isSport?"none":"block";
  if(sCard)sCard.style.display=isSport?"block":"none";

  renderSportTest();
}

function renderSportTest(){
  if(!document.getElementById("sportAnalysis"))return;

  let t=S.sportTest||{distance:3,targetTime:15,testDate:"",currentTime:0};

  if(document.getElementById("runDistance"))runDistance.value=t.distance||3;
  if(document.getElementById("runTargetTime"))runTargetTime.value=t.targetTime||15;
  if(document.getElementById("runTestDate"))runTestDate.value=t.testDate||"";
  if(document.getElementById("runCurrentTime"))runCurrentTime.value=t.currentTime||"";

  if(!t.currentTime){
    sportAnalysis.innerHTML="أدخل آخر زمن لك عشان نبدأ التحليل.";
    return;
  }

  let targetPace=t.targetTime/t.distance;
let currentPace=t.currentTime/t.distance;
let diff=t.currentTime-t.targetTime;
let readiness=Math.max(0,Math.min(100,(t.targetTime/t.currentTime)*100));
let paceDiff=currentPace-targetPace;
let daysLeft=t.testDate?Math.ceil((new Date(t.testDate)-new Date())/(1000*60*60*24)):null;
let weeklyNeed=diff>0 && daysLeft>0?(diff/(daysLeft/7)):0;

let statusText=
readiness>=100?"جاهز للاختبار ✅":
readiness>=90?"قريب جداً 🔥":
readiness>=80?"تحتاج تحسين بسيط 💪":
"تحتاج خطة تدريب أقوى ⚠️";

  sportAnalysis.innerHTML=`
<div class="coachTitle">📊 لوحة الجاهزية</div>

<div class="statsGrid" style="margin-top:14px">
<div class="statCard"><div class="statLabel">🎯 الهدف</div><div class="statValue">${t.distance} كم</div></div>
<div class="statCard"><div class="statLabel">⏱️ الزمن</div><div class="statValue">${t.targetTime} د</div></div>
<div class="statCard"><div class="statLabel">🏃 الحالي</div><div class="statValue">${t.currentTime} د</div></div>
<div class="statCard"><div class="statLabel">🔥 الجاهزية</div><div class="statValue">${readiness.toFixed(0)}%</div></div>
<div class="statCard"><div class="statLabel">📉 الفرق</div><div class="statValue">${Math.max(0,diff).toFixed(1)} د</div></div>
<div class="statCard"><div class="statLabel">📅 المتبقي</div><div class="statValue">${daysLeft!==null?Math.max(0,daysLeft):"--"} يوم</div></div>
<div class="statCard"><div class="statLabel">⏱️ Pace مطلوب</div><div class="statValue">${targetPace.toFixed(2)}</div></div>

<div class="coachItem">🎯 ${weeks?`قد تصل لهدفك خلال ${weeks.toFixed(1)} أسبوع إن شاء الله.`:"سجل أكثر عشان نحسب توقع الوصول."}</div>

function goalSummary(cur,loss,rem){
  let valid=D.filter(x=>x.w).sort((a,b)=>a.d.localeCompare(b.d));

  if(valid.length<2){
    return '<div class="coachBox"><div class="coachTitle">💡 ملخص ذكي</div><div class="coachText">سجل وزنك يومين على الأقل حتى يبدأ المدرب الذكي.</div></div>';
  }

  let first=valid[0], last=valid[valid.length-1], prev=valid[valid.length-2];

  cur=+cur||+last.w;
  loss=+loss||((+S.start||+first.w)-cur);
  rem=+rem||(cur-(+S.goal||75));

  let startW=+S.start||+first.w;
  let goalW=+S.goal||75;
  let target=startW-goalW;
  let diff=cur-(+prev.w);
  let progress=target?Math.max(0,Math.min(100,(loss/target)*100)):0;

  let days=Math.max(1,Math.ceil((new Date(last.d)-new Date(first.d))/(1000*60*60*24)));
  let daysSinceLast=Math.max(0,Math.floor((new Date()-new Date(last.d))/(1000*60*60*24)));
  let weeklyRate=(loss/days)*7;

  let safeWeeklyRate=weeklyRate>0?Math.min(Math.max(weeklyRate,0.3),1.0):0;
  let weeks=safeWeeklyRate>0&&rem>0?rem/safeWeeklyRate:null;

  let avgSteps=Math.round(valid.reduce((a,x)=>a+(+x.st||0),0)/valid.length);
  let best=Math.min(...valid.map(x=>+x.w));

  let lastWeights=valid.slice(-4).map(x=>+x.w);
  let plateau=false;
  if(lastWeights.length>=4){
    let maxW=Math.max(...lastWeights);
    let minW=Math.min(...lastWeights);
    plateau=(maxW-minW)<=0.2;
  }

  let status=weeklyRate>=0.7?"🔥 ممتاز جداً":weeklyRate>=0.3?"🟢 ممتاز":weeklyRate>0?"🟡 جيد":diff===0?"🟠 ثابت":"🔴 يحتاج انتباه";

  let successScore=50;
  if(weeklyRate>0) successScore+=20;
  if(weeklyRate>=0.3&&weeklyRate<=1.0) successScore+=20;
  if(weeklyRate>1.2) successScore-=10;
  if(avgSteps>=8000) successScore+=10;
  if(avgSteps>0&&avgSteps<5000) successScore-=10;
  if(valid.length>=7) successScore+=10;
  if(daysSinceLast>=3) successScore-=15;
  if(diff>0) successScore-=5;
  if(progress>=20) successScore+=10;
  if(progress>=50) successScore+=10;
  successScore=Math.max(0,Math.min(100,successScore));

  let successLabel=successScore>=85?"🟢 مرتفع جداً":successScore>=70?"🟢 مرتفع":successScore>=50?"🟡 متوسط":"🔴 منخفض";

  let advice="استمر بنفس الأداء وحافظ على تسجيل وزنك وخطواتك بانتظام.";

  if(plateau){
    advice="وزنك ثابت تقريباً في آخر عدة تسجيلات. هذا ممكن يكون Plateau طبيعي. خطة 3 أيام: ارفع المشي 2000 خطوة، ثبّت أكلك، واشرب ماء أكثر قبل ما تغيّر النظام.";
  }else if(daysSinceLast>=3){
    advice="آخر تسجيل كان قبل "+daysSinceLast+" أيام. سجّل وزنك اليوم حتى تبقى التوقعات دقيقة.";
  }else if(diff===0){
    advice="وزنك ثابت عن آخر تسجيل. جرّب زيادة المشي 2000 خطوة يومياً خلال الثلاثة أيام القادمة.";
  }else if(diff>0){
    advice="وزنك ارتفع "+diff.toFixed(1)+" كجم عن آخر تسجيل. غالباً بسبب سوائل أو وجبة ثقيلة، ركّز اليوم على الماء والمشي ولا تغيّر خطتك من يوم واحد.";
  }else if(weeklyRate>1.2){
    advice="نزولك سريع جداً. استمر، لكن تأكد أن أكلك متوازن ولا تعتمد على الحرمان.";
  }else if(avgSteps>0&&avgSteps<6000){
    advice="متوسط خطواتك "+avgSteps+" خطوة، وهذا أقل من المطلوب. حاول ترفعها تدريجياً إلى 8000 خطوة.";
  }else if(avgSteps>=8000&&weeklyRate>0){
    advice="خطواتك ممتازة ونزولك مستمر. حافظ على نفس النشاط هذا الأسبوع.";
  }else if(progress>=75){
    advice="اقتربت كثيراً من هدفك. في هذه المرحلة النزول قد يبطأ، فركز على الثبات أكثر من السرعة.";
  }else if(progress>=50){
    advice="تجاوزت نصف الطريق. أفضل شيء الآن هو الاستمرارية وعدم تغيير الخطة كثيراً.";
  }else if(diff<0){
    advice="آخر تسجيل أفضل من السابق. استمر بنفس النظام وحافظ على خطواتك اليومية.";
  }

  let etaDate="";
  if(weeks){
    let d=new Date();
    d.setDate(d.getDate()+Math.round(weeks*7));
    etaDate=d.toLocaleDateString(S.lang==="ar"?"ar-AE":"en-US",{day:"numeric",month:"long",year:"numeric"});
  }

  let etaText=weeks?("متوقع الوصول خلال "+weeks.toFixed(1)+" أسبوع تقريباً، حوالي "+etaDate+"."):"نحتاج بيانات أكثر لحساب موعد الوصول.";

  return '<div class="coachBox">'+
    '<div class="coachTitle">💡 ملخص ذكي</div>'+
    '<div class="coachText">'+status+'</div>'+
    '<div class="coachList">'+
      '<div class="coachItem">🎯 أنجزت '+progress.toFixed(0)+'% من هدفك.</div>'+
      '<div class="coachItem">⚡ احتمال نجاح الهدف: '+successScore+'% • '+successLabel+'</div>'+
      '<div class="coachItem">⚖️ المتبقي '+rem.toFixed(1)+' كجم.</div>'+
      '<div class="coachItem">⏳ '+etaText+'</div>'+
      '<div class="coachItem">🏆 أفضل وزن '+best.toFixed(1)+' كجم.</div>'+
      '<div class="coachItem">🚶 متوسط خطواتك '+(avgSteps||0)+' خطوة.</div>'+
      '<div class="coachItem">💬 '+advice+'</div>'+
    '</div>'+
  '</div>';
}

let weeks=[];
for(let i=1;i<D.length;i+=7){
weeks.push(+(D[i-1].w-D[Math.min(i+6,D.length-1)].w).toFixed(1));
}

let w=document.getElementById("weekChart");
if(w && typeof Chart!=="undefined"){
W=new Chart(w,{type:"bar",data:{labels:weeks.map((_,i)=>"الأسبوع "+(i+1)),datasets:[{label:"Weekly loss",data:weeks}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
}
}

function showRoute(id){
  let x=AD.find(a=>a.id===id);
  if(!x || !x.route || !x.route.length){
    alert("لا يوجد مسار محفوظ لهذا النشاط");
    return;
  }

  let old=document.getElementById("routeViewer");
  if(old)old.remove();

  let box=document.createElement("div");
  box.id="routeViewer";
  box.className="card";
  box.style.marginTop="16px";

  box.innerHTML=`
    <h3>🗺️ مسار النشاط</h3>
    <div class="muted">
      ${activityName(x.type)} — ${x.d}<br>
      ⏱️ ${x.minutes} دقيقة | 📍 ${x.km} كم | 🔥 ${x.burn} سعرة
    </div>
    <div id="routeMap" class="routeMap"></div>
    <button class="btn btn2" style="margin-top:12px;width:100%" onclick="document.getElementById('routeViewer').remove()">إغلاق الخريطة</button>
  `;

  let btn=document.querySelector(`[onclick="showRoute(${id})"]`);
let item=btn?btn.closest(".activityItem"):null;

if(item){
    item.insertAdjacentElement("afterend",box);
}else{
    let list=document.getElementById("activitiesList");
    list.parentElement.appendChild(box);
}

box.scrollIntoView({
    behavior:"smooth",
    block:"center"
});

  setTimeout(function(){
    let pts=x.route.map(p=>[p.lat,p.lon]);
    let map=L.map("routeMap").setView(pts[0],16);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
      maxZoom:19
    }).addTo(map);

    if(pts.length>1){

  let line=L.polyline(pts,{
  weight:7,
  opacity:0.95,
  smoothFactor:1.5,
  lineCap:"round",
  lineJoin:"round"
}).addTo(map);

  let startPoint=pts[0];
let endPoint=pts[pts.length-1];
let startEndDistance=map.distance(startPoint,endPoint);

if(startEndDistance<10){

  L.marker(startPoint,{
    icon:L.divIcon({
      className:"",
      html:"<div style='font-size:28px'>🏁</div>",
      iconSize:[30,30],
      iconAnchor:[15,15]
    })
  }).addTo(map).bindPopup("🏁 بداية / نهاية");

}else{

  L.circleMarker(startPoint,{
    radius:9,
    color:"#16a34a",
    fillColor:"#22c55e",
    fillOpacity:1,
    weight:3
  }).addTo(map).bindPopup("🟢 البداية");

  L.marker(endPoint,{
    icon:L.divIcon({
      className:"",
      html:"<div style='font-size:28px'>🏁</div>",
      iconSize:[30,30],
      iconAnchor:[15,15]
    })
  }).addTo(map).bindPopup("🏁 النهاية");

}
  map.fitBounds(line.getBounds(),{
    padding:[30,30]
  });

}else{

  L.marker(pts[0]).addTo(map)
    .bindPopup("📍 نقطة النشاط");

  map.setView(pts[0],17);

}
  },200);
}

updateTodayPreview();

["weight","steps","cal"].forEach(function(id){
  let el=document.getElementById(id);
  if(el){
    el.addEventListener("input", updateTodayPreview);
  }
});

render();
</script>
